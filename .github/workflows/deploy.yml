name: Deploy

on:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  deploy:
    name: Build and deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: |
          npm run build
          echo "Metrika ID configured: $([[ -n "$NEXT_PUBLIC_YANDEX_METRIKA_ID" ]] && echo yes || echo no)"
        env:
          NEXT_PUBLIC_SITE_URL: https://gibadullina-psychology.ru
          NEXT_PUBLIC_YANDEX_METRIKA_ID: ${{ secrets.NEXT_PUBLIC_YANDEX_METRIKA_ID }}

      - name: Validate deploy secrets
        run: |
          set -euo pipefail
          for name in TELEGRAM_BOT_TOKEN NEXT_PUBLIC_SITE_URL NEXT_PUBLIC_YANDEX_METRIKA_ID; do
            if [ -z "${!name}" ]; then
              echo "::error::$name is not configured"
              exit 1
            fi
          done
          if [ -z "${TELEGRAM_CHAT_IDS}" ]; then
            echo "::error::TELEGRAM_CHAT_IDS is not configured"
            exit 1
          fi
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_IDS: ${{ secrets.TELEGRAM_CHAT_IDS }}
          NEXT_PUBLIC_SITE_URL: https://gibadullina-psychology.ru
          NEXT_PUBLIC_YANDEX_METRIKA_ID: ${{ secrets.NEXT_PUBLIC_YANDEX_METRIKA_ID }}

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "${{ secrets.VPS_HOST }}" >> ~/.ssh/known_hosts

      - name: Deploy on VPS
        timeout-minutes: 20
        run: |
          set -euo pipefail
          runtime_env_b64="$(
            {
              printf 'TELEGRAM_BOT_TOKEN=%s\n' "$TELEGRAM_BOT_TOKEN"
              printf 'TELEGRAM_CHAT_IDS=%s\n' "$TELEGRAM_CHAT_IDS"
              printf 'NEXT_PUBLIC_SITE_URL=%s\n' "$NEXT_PUBLIC_SITE_URL"
              printf 'NEXT_PUBLIC_YANDEX_METRIKA_ID=%s\n' "$NEXT_PUBLIC_YANDEX_METRIKA_ID"
            } | base64 | tr -d '\n'
          )"
          site_url_b64="$(printf '%s' "$NEXT_PUBLIC_SITE_URL" | base64 | tr -d '\n')"
          metrika_id_b64="$(printf '%s' "$NEXT_PUBLIC_YANDEX_METRIKA_ID" | base64 | tr -d '\n')"
          git_auth_header_b64="$(printf 'x-access-token:%s' "$DEPLOY_REPO_TOKEN" | base64 | tr -d '\n')"

          ssh \
            -i ~/.ssh/deploy_key \
            -o BatchMode=yes \
            -o ServerAliveInterval=30 \
            -o ServerAliveCountMax=3 \
            -o ConnectTimeout=60 \
            "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" \
            "GITHUB_SHA='${GITHUB_SHA}' GITHUB_REF_NAME='${GITHUB_REF_NAME}' GITHUB_REPOSITORY='${GITHUB_REPOSITORY}' GIT_AUTH_HEADER_B64='${git_auth_header_b64}' RUNTIME_ENV_B64='${runtime_env_b64}' NEXT_PUBLIC_SITE_URL_B64='${site_url_b64}' NEXT_PUBLIC_YANDEX_METRIKA_ID_B64='${metrika_id_b64}' bash -s" <<'EOF'
            set -euo pipefail

            APP_NAME="ekat-gib"
            APP_DIR="/var/www/clients"
            SHARED_DIR="/var/www/shared"
            SHARED_ENV="${SHARED_DIR}/${APP_NAME}.env"
            RELEASES_DIR="${APP_DIR}/ekatgib-releases"
            RELEASE_DIR="${RELEASES_DIR}/${APP_NAME}-${GITHUB_SHA}"
            CURRENT_LINK="${APP_DIR}/ekatgib"
            SOURCE_DIR="${APP_DIR}/ekatgib-source"
            TMP_LINK="${CURRENT_LINK}.tmp-${GITHUB_SHA}"
            STAGING_DIR="${RELEASE_DIR}.staging-$$"
            trap 'rm -rf "${STAGING_DIR}" "${TMP_LINK}"' EXIT

            command -v git >/dev/null
            command -v npm >/dev/null
            command -v pm2 >/dev/null

            mkdir -p "${APP_DIR}" "${RELEASES_DIR}" "${SHARED_DIR}"
            printf '%s' "${RUNTIME_ENV_B64}" | base64 -d > "${SHARED_ENV}"
            chmod 600 "${SHARED_ENV}"

            if [ ! -d "${SOURCE_DIR}/.git" ]; then
              rm -rf "${SOURCE_DIR}"
              git init "${SOURCE_DIR}"
              git -C "${SOURCE_DIR}" remote add origin "https://github.com/${GITHUB_REPOSITORY}.git"
            fi

            git -C "${SOURCE_DIR}" remote set-url origin "https://github.com/${GITHUB_REPOSITORY}.git"
            git_auth_header="AUTHORIZATION: basic ${GIT_AUTH_HEADER_B64}"
            git -C "${SOURCE_DIR}" -c http.https://github.com/.extraheader="${git_auth_header}" fetch --force --depth=1 origin "${GITHUB_REF_NAME}"
            git -C "${SOURCE_DIR}" checkout --force "${GITHUB_SHA}"
            git -C "${SOURCE_DIR}" clean -fdx

            cd "${SOURCE_DIR}"
            npm ci
            NEXT_PUBLIC_SITE_URL="$(printf '%s' "${NEXT_PUBLIC_SITE_URL_B64}" | base64 -d)" \
              NEXT_PUBLIC_YANDEX_METRIKA_ID="$(printf '%s' "${NEXT_PUBLIC_YANDEX_METRIKA_ID_B64}" | base64 -d)" \
              npm run build

            rm -rf "${STAGING_DIR}"
            mkdir -p "${STAGING_DIR}/.next"
            cp -R .next/standalone "${STAGING_DIR}/.next/standalone"
            cp -R .next/static "${STAGING_DIR}/.next/static"
            cp -R public "${STAGING_DIR}/public"
            mkdir -p "${STAGING_DIR}/.next/standalone/.next"
            cp -R .next/static "${STAGING_DIR}/.next/standalone/.next/static"
            cp -R public "${STAGING_DIR}/.next/standalone/public"
            cp package.json "${STAGING_DIR}/package.json"
            cp ecosystem.config.cjs "${STAGING_DIR}/ecosystem.config.cjs"

            CURRENT_TARGET="$(readlink "${CURRENT_LINK}" 2>/dev/null || true)"

            if [ "${CURRENT_TARGET}" = "${RELEASE_DIR}" ] && [ -d "${RELEASE_DIR}" ]; then
              rm -rf "${STAGING_DIR}"
            else
              rm -rf "${RELEASE_DIR}"
              mv "${STAGING_DIR}" "${RELEASE_DIR}"
            fi

            if [ -e "${CURRENT_LINK}" ] && [ ! -L "${CURRENT_LINK}" ]; then
              mv "${CURRENT_LINK}" "${CURRENT_LINK}.legacy-$(date +%Y%m%d%H%M%S)"
            fi

            ln -sfn "${RELEASE_DIR}" "${TMP_LINK}"
            mv -Tf "${TMP_LINK}" "${CURRENT_LINK}"

            mkdir -p "${SHARED_DIR}"

            cd "${CURRENT_LINK}"
            pm2 reload ekat-gib --update-env || pm2 start ecosystem.config.cjs --env production
            pm2 save

            find "${RELEASES_DIR}" -maxdepth 1 -type d -name "${APP_NAME}-*" -print \
              | sort -r \
              | tail -n +4 \
              | xargs -r rm -rf
          EOF
        env:
          DEPLOY_REPO_TOKEN: ${{ github.token }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_IDS: ${{ secrets.TELEGRAM_CHAT_IDS }}
          NEXT_PUBLIC_SITE_URL: https://gibadullina-psychology.ru
          NEXT_PUBLIC_YANDEX_METRIKA_ID: ${{ secrets.NEXT_PUBLIC_YANDEX_METRIKA_ID }}

      - name: Ping IndexNow
        run: curl -fsS -X POST https://servakbaza.ru/api/indexnow || true
