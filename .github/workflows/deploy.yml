name: Deploy

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Build and deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_SITE_URL: https://gibadullina-psychology.ru
          NEXT_PUBLIC_YANDEX_METRIKA_ID: ${{ secrets.NEXT_PUBLIC_YANDEX_METRIKA_ID }}

      - name: Prepare deploy package
        run: |
          mkdir -p deploy-package/.next
          cp -R .next/standalone deploy-package/.next/standalone
          cp -R .next/static deploy-package/.next/static
          cp -R public deploy-package/public
          mkdir -p deploy-package/.next/standalone/.next
          cp -R .next/static deploy-package/.next/standalone/.next/static
          cp -R public deploy-package/.next/standalone/public
          cp package.json deploy-package/package.json
          cp ecosystem.config.cjs deploy-package/ecosystem.config.cjs
          tar -czf deploy-package.tar.gz -C deploy-package .

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "${{ secrets.VPS_HOST }}" >> ~/.ssh/known_hosts

      - name: Upload deploy package
        run: |
          scp \
            -i ~/.ssh/deploy_key \
            -o ServerAliveInterval=30 \
            -o ServerAliveCountMax=10 \
            -o ConnectTimeout=60 \
            deploy-package.tar.gz \
            "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:/tmp/ekat-gib.tar.gz"

      - name: Activate on VPS
        run: |
          ssh \
            -i ~/.ssh/deploy_key \
            -o ServerAliveInterval=30 \
            -o ServerAliveCountMax=10 \
            -o ConnectTimeout=60 \
            "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" <<'EOF'
            set -e
            mkdir -p /var/www/ekat-gib
            tar -xzf /tmp/ekat-gib.tar.gz -C /var/www/ekat-gib
            cd /var/www/ekat-gib
            pm2 reload ekat-gib || pm2 start ecosystem.config.cjs --env production
            pm2 save
          EOF
