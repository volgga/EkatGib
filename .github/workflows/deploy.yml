name: Deploy

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Build and deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: |
          npm run build
          echo "Metrika ID configured: $([[ -n "$NEXT_PUBLIC_YANDEX_METRIKA_ID" ]] && echo yes || echo no)"
        env:
          NEXT_PUBLIC_SITE_URL: https://gibadullina-psychology.ru
          NEXT_PUBLIC_YANDEX_METRIKA_ID: ${{ secrets.NEXT_PUBLIC_YANDEX_METRIKA_ID }}

      - name: Prepare deploy package
        run: |
          set -euo pipefail
          for name in TELEGRAM_BOT_TOKEN NEXT_PUBLIC_SITE_URL NEXT_PUBLIC_YANDEX_METRIKA_ID; do
            if [ -z "${!name}" ]; then
              echo "::error::$name is not configured"
              exit 1
            fi
          done
          if [ -z "${TELEGRAM_CHAT_IDS}" ]; then
            echo "::error::TELEGRAM_CHAT_IDS is not configured"
            exit 1
          fi
          mkdir -p deploy-package/.next
          cp -R .next/standalone deploy-package/.next/standalone
          cp -R .next/static deploy-package/.next/static
          cp -R public deploy-package/public
          mkdir -p deploy-package/.next/standalone/.next
          cp -R .next/static deploy-package/.next/standalone/.next/static
          cp -R public deploy-package/.next/standalone/public
          cp package.json deploy-package/package.json
          cp ecosystem.config.cjs deploy-package/ecosystem.config.cjs
          tar -czf deploy-package.tar.gz -C deploy-package .
          tar -tzf deploy-package.tar.gz > /dev/null
          cp deploy-package.tar.gz "ekat-gib-${GITHUB_SHA}.tar.gz"
          sha256sum "ekat-gib-${GITHUB_SHA}.tar.gz" > "ekat-gib-${GITHUB_SHA}.tar.gz.sha256"
          {
            printf 'TELEGRAM_BOT_TOKEN=%s\n' "$TELEGRAM_BOT_TOKEN"
            printf 'TELEGRAM_CHAT_IDS=%s\n' "$TELEGRAM_CHAT_IDS"
            printf 'NEXT_PUBLIC_SITE_URL=%s\n' "$NEXT_PUBLIC_SITE_URL"
            printf 'NEXT_PUBLIC_YANDEX_METRIKA_ID=%s\n' "$NEXT_PUBLIC_YANDEX_METRIKA_ID"
          } > "ekat-gib-${GITHUB_SHA}.env"
          chmod 600 "ekat-gib-${GITHUB_SHA}.env"
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_IDS: ${{ secrets.TELEGRAM_CHAT_IDS }}
          NEXT_PUBLIC_SITE_URL: https://gibadullina-psychology.ru
          NEXT_PUBLIC_YANDEX_METRIKA_ID: ${{ secrets.NEXT_PUBLIC_YANDEX_METRIKA_ID }}

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "${{ secrets.VPS_HOST }}" >> ~/.ssh/known_hosts

      - name: Upload deploy package
        run: |
          scp \
            -i ~/.ssh/deploy_key \
            -o ServerAliveInterval=30 \
            -o ServerAliveCountMax=10 \
            -o ConnectTimeout=60 \
            "ekat-gib-${GITHUB_SHA}.tar.gz" \
            "ekat-gib-${GITHUB_SHA}.tar.gz.sha256" \
            "ekat-gib-${GITHUB_SHA}.env" \
            "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:/tmp/"

      - name: Activate on VPS
        run: |
          ssh \
            -i ~/.ssh/deploy_key \
            -o ServerAliveInterval=30 \
            -o ServerAliveCountMax=10 \
            -o ConnectTimeout=60 \
            "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" \
            "GITHUB_SHA=${GITHUB_SHA} bash -s" <<'EOF'
            set -euo pipefail

            APP_NAME="ekat-gib"
            APP_DIR="/var/www/clients"
            SHARED_DIR="/var/www/shared"
            SHARED_ENV="${SHARED_DIR}/${APP_NAME}.env"
            RELEASES_DIR="${APP_DIR}/ekatgib-releases"
            RELEASE_DIR="${RELEASES_DIR}/${APP_NAME}-${GITHUB_SHA}"
            CURRENT_LINK="${APP_DIR}/ekatgib"
            ARCHIVE="/tmp/${APP_NAME}-${GITHUB_SHA}.tar.gz"
            CHECKSUM_FILE="/tmp/${APP_NAME}-${GITHUB_SHA}.tar.gz.sha256"
            RUNTIME_ENV="/tmp/${APP_NAME}-${GITHUB_SHA}.env"
            TMP_LINK="${CURRENT_LINK}.tmp-${GITHUB_SHA}"
            STAGING_DIR="${RELEASE_DIR}.staging-$$"
            trap 'rm -rf "${STAGING_DIR}" "${TMP_LINK}"' EXIT

            cd /tmp
            sha256sum -c "${CHECKSUM_FILE}"

            mkdir -p "${APP_DIR}" "${RELEASES_DIR}"
            rm -rf "${STAGING_DIR}"
            mkdir -p "${STAGING_DIR}"

            tar -xzf "${ARCHIVE}" -C "${STAGING_DIR}"

            CURRENT_TARGET="$(readlink "${CURRENT_LINK}" 2>/dev/null || true)"

            if [ "${CURRENT_TARGET}" = "${RELEASE_DIR}" ] && [ -d "${RELEASE_DIR}" ]; then
              rm -rf "${STAGING_DIR}"
            else
              rm -rf "${RELEASE_DIR}"
              mv "${STAGING_DIR}" "${RELEASE_DIR}"
            fi

            if [ -e "${CURRENT_LINK}" ] && [ ! -L "${CURRENT_LINK}" ]; then
              mv "${CURRENT_LINK}" "${CURRENT_LINK}.legacy-$(date +%Y%m%d%H%M%S)"
            fi

            ln -sfn "${RELEASE_DIR}" "${TMP_LINK}"
            mv -Tf "${TMP_LINK}" "${CURRENT_LINK}"

            mkdir -p "${SHARED_DIR}"
            install -m 600 "${RUNTIME_ENV}" "${SHARED_ENV}"

            cd "${CURRENT_LINK}"
            pm2 reload ekat-gib --update-env || pm2 start ecosystem.config.cjs --env production
            pm2 save
            rm -f "${ARCHIVE}" "${CHECKSUM_FILE}" "${RUNTIME_ENV}"

            find "${RELEASES_DIR}" -maxdepth 1 -type d -name "${APP_NAME}-*" -print \
              | sort -r \
              | tail -n +4 \
              | xargs -r rm -rf
          EOF
