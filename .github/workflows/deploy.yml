name: Deploy

on:
  push:
    branches:
      - main

jobs:
  checks:
    name: Lint and build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_SITE_URL: https://gibadullina-psychology.ru

  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    needs: checks

    steps:
      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "${{ secrets.VPS_HOST }}" >> ~/.ssh/known_hosts

      - name: Deploy over SSH
        run: |
          ssh \
            -i ~/.ssh/deploy_key \
            -o ServerAliveInterval=30 \
            -o ServerAliveCountMax=10 \
            -o ConnectTimeout=60 \
            "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" <<'EOF'
            set -e
            cd /var/www/ekat-gib
            git pull origin main
            npm ci
            NEXT_PUBLIC_SITE_URL=https://gibadullina-psychology.ru npm run build
            cp -r public .next/standalone/public
            mkdir -p .next/standalone/.next
            cp -r .next/static .next/standalone/.next/static
            pm2 reload ekat-gib || pm2 restart ekat-gib
            pm2 save
          EOF
